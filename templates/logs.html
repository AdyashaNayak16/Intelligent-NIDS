{% extends "base.html" %}

{% block content %}

<h1>Logs</h1>

<table class="alerts-table">

    <thead>
        <tr>
            <th>Time</th>
            <th>Alert Type</th>
            <th>Source</th>
        </tr>
    </thead>

    <tbody>

        {% for alert in alerts %}
        <tr>
            <td>{{ alert.time }}</td>
            <td>{{ alert.type }}</td>
            <td>{{ alert.source }}</td>
        </tr>
        {% endfor %}

    </tbody>

</table>

{% endblock %}
